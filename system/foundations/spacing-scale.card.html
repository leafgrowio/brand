<!-- @dsCard group="Spacing" viewport="700x260" subtitle="space-1 through space-9, as proportional Coral bars" name="Spacing scale" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--leaf-surface-card); }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: var(--leaf-space-4);
  }
  .row {
    display: flex;
    align-items: center;
    gap: var(--leaf-space-3);
  }
  .token {
    width: 84px;
    flex-shrink: 0;
    font: var(--leaf-type-caption);
    color: var(--leaf-text-secondary);
  }
  .bar {
    height: 14px;
    background: var(--leaf-color-coral);
    border-radius: var(--leaf-radius-sm);
  }
  .px {
    font: var(--leaf-type-caption);
    color: var(--leaf-text-muted);
    width: 40px;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="token">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
    <div class="row"><div class="token">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
    <div class="row"><div class="token">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
    <div class="row"><div class="token">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
    <div class="row"><div class="token">space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
    <div class="row"><div class="token">space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
    <div class="row"><div class="token">space-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
    <div class="row"><div class="token">space-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
    <div class="row"><div class="token">space-9</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
  </div>
</body>
</html>
