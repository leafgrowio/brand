<!-- @dsCard group="Type" viewport="700x170" subtitle="ss03, ss05, ss06, ss07 — always on, shown on Ink; the Q is Mona Sans&#39;s default" name="Stylistic sets" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--leaf-surface-card); }
  .panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--leaf-space-3);
    height: 170px;
    box-sizing: border-box;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-ink);
  }
  .tile {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--leaf-space-2);
  }
  .glyph {
    font-family: var(--leaf-font-sans);
    font-weight: 600;
    font-size: 52px;
    line-height: 1;
    color: var(--leaf-text-on-dark);
  }
  .code {
    font: var(--leaf-type-caption);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--leaf-color-aqua);
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="tile"><div class="glyph">l</div><div class="code">ss03</div></div>
    <div class="tile"><div class="glyph">a</div><div class="code">ss05</div></div>
    <div class="tile"><div class="glyph">g</div><div class="code">ss06</div></div>
    <div class="tile"><div class="glyph">G</div><div class="code">ss07</div></div>
    <div class="tile"><div class="glyph">Q</div><div class="code">default</div></div>
  </div>
</body>
</html>
