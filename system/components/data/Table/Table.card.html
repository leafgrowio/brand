<!-- @dsCard group="Components" viewport="700x260" subtitle="zebra, heatmap, delta, em-dash null" name="Table" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body { margin: 0; background: var(--leaf-surface-card); }
  .wrap { padding: var(--leaf-space-4); }
  .table-card {
    background: var(--leaf-surface-card);
    border: 1px solid var(--leaf-border-light);
    border-radius: var(--leaf-radius-lg);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr {
    background: var(--leaf-color-stone-faint);
    border-bottom: 1.5px solid rgba(23, 20, 18, 0.14);
  }
  th {
    text-align: left;
    padding: 13px 16px;
    font-family: var(--leaf-font-sans);
    font-size: 11.5px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.02em;
    color: var(--leaf-color-ink);
  }
  th.num { text-align: right; }
  tbody tr {
    border-bottom: 1px solid rgba(23, 20, 18, 0.07);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--leaf-color-stone-faint); }
  td {
    padding: 12px 16px;
    font-family: var(--leaf-font-sans);
    font-size: 13.5px;
    font-weight: 400;
    line-height: 1;
    color: var(--leaf-color-ink);
  }
  td.num {
    text-align: right;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .delta {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .delta.up { color: var(--leaf-color-state-success); }
  .delta.down { color: var(--leaf-color-state-error); }
  .empty { color: var(--leaf-text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="table-card">
      <table>
        <caption class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Spend and return by channel</caption>
        <thead>
          <tr>
            <th>Channel</th>
            <th class="num">Spend</th>
            <th class="num">ROAS</th>
            <th class="num">Δ</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Paid media</td>
            <td class="num">£1.49M</td>
            <td class="num" style="background: var(--leaf-ramp-harbor-1);">3.72x</td>
            <td class="num"><span class="delta up">▲ 18%</span></td>
          </tr>
          <tr>
            <td>Organic</td>
            <td class="num">£0.55M</td>
            <td class="num" style="background: var(--leaf-heatmap-mid);">2.98x</td>
            <td class="num"><span class="delta up">▲ 4%</span></td>
          </tr>
          <tr>
            <td>Email</td>
            <td class="num">£0.37M</td>
            <td class="num" style="background: var(--leaf-ramp-coral-2);">2.14x</td>
            <td class="num"><span class="delta down">▼ 6%</span></td>
          </tr>
          <tr>
            <td>Direct</td>
            <td class="num">£0.21M</td>
            <td class="num" style="background: var(--leaf-ramp-harbor-2);">4.10x</td>
            <td class="num"><span class="empty">—</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
