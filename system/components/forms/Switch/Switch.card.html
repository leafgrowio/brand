<!-- @dsCard group="Components" viewport="700x120" subtitle="off, on, disabled" name="Switch" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
  }
  .row {
    display: flex;
    gap: var(--leaf-space-6);
  }
  .group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--leaf-space-2);
  }
  .switch {
    display: inline-flex;
    align-items: center;
    gap: var(--leaf-space-2);
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--leaf-color-ink);
  }
  .switch.is-disabled {
    opacity: 0.4;
  }
  .track {
    position: relative;
    width: 44px;
    height: 26px;
    border-radius: var(--leaf-radius-pill);
    background: var(--leaf-color-stone-hairline);
  }
  .track.on {
    background: var(--leaf-color-coral);
  }
  .thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--leaf-color-canvas);
    box-shadow: 0 1px 2px rgba(23, 20, 18, 0.2);
  }
  .track.on .thumb {
    left: 21px;
  }
  .cap {
    font: var(--leaf-type-caption);
    color: var(--leaf-text-muted);
  }
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <label class="switch">
        <span class="track" aria-hidden="true"><span class="thumb"></span></span>
        Email notifications
      </label>
      <span class="cap">Off</span>
    </div>
    <div class="group">
      <label class="switch">
        <span class="track on" aria-hidden="true"><span class="thumb"></span></span>
        Push notifications
      </label>
      <span class="cap">On</span>
    </div>
    <div class="group">
      <label class="switch is-disabled">
        <span class="track" aria-hidden="true"><span class="thumb"></span></span>
        SMS alerts
      </label>
      <span class="cap">Disabled</span>
    </div>
  </div>
</body>
</html>
