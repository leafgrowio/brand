<!-- @dsCard group="Components" viewport="700x120" subtitle="off, on, disabled" name="Radio" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
  }
  .row {
    display: flex;
    gap: var(--leaf-space-6);
  }
  .group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--leaf-space-2);
  }
  .radio {
    display: inline-flex;
    align-items: center;
    gap: var(--leaf-space-2);
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--leaf-color-ink);
  }
  .radio.is-disabled {
    opacity: 0.4;
  }
  .box {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid rgba(23, 20, 18, 0.3);
    background: var(--leaf-color-canvas);
  }
  .box.checked {
    border-color: var(--leaf-color-coral);
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--leaf-color-coral);
  }
  .cap {
    font: var(--leaf-type-caption);
    color: var(--leaf-text-muted);
  }
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <label class="radio">
        <span class="box" aria-hidden="true"></span>
        Weekly digest
      </label>
      <span class="cap">Off</span>
    </div>
    <div class="group">
      <label class="radio">
        <span class="box checked" aria-hidden="true"><span class="dot"></span></span>
        Monthly digest
      </label>
      <span class="cap">On</span>
    </div>
    <div class="group">
      <label class="radio is-disabled">
        <span class="box" aria-hidden="true"></span>
        Quarterly digest
      </label>
      <span class="cap">Disabled</span>
    </div>
  </div>
</body>
</html>
