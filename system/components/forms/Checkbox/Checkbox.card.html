<!-- @dsCard group="Components" viewport="700x120" subtitle="off, on, disabled" name="Checkbox" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
  }
  .row {
    display: flex;
    gap: var(--leaf-space-6);
  }
  .group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--leaf-space-2);
  }
  .checkbox {
    display: inline-flex;
    align-items: center;
    gap: var(--leaf-space-2);
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--leaf-color-ink);
  }
  .checkbox.is-disabled {
    opacity: 0.4;
  }
  .box {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid rgba(23, 20, 18, 0.3);
    background: var(--leaf-color-canvas);
  }
  .box.checked {
    background: var(--leaf-color-coral);
    border-color: var(--leaf-color-coral);
  }
  .box svg {
    color: var(--leaf-color-canvas);
  }
  .cap {
    font: var(--leaf-type-caption);
    color: var(--leaf-text-muted);
  }
</style>
</head>
<body>
  <div class="row">
    <div class="group">
      <label class="checkbox">
        <span class="box" aria-hidden="true"></span>
        Send a weekly summary
      </label>
      <span class="cap">Off</span>
    </div>
    <div class="group">
      <label class="checkbox">
        <span class="box checked" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 12 10 17 19 7"></polyline>
          </svg>
        </span>
        Include unsubscribed contacts
      </label>
      <span class="cap">On</span>
    </div>
    <div class="group">
      <label class="checkbox is-disabled">
        <span class="box" aria-hidden="true"></span>
        Enable legacy exports
      </label>
      <span class="cap">Disabled</span>
    </div>
  </div>
</body>
</html>
