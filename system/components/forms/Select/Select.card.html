<!-- @dsCard group="Components" viewport="700x150" subtitle="default and disabled" name="Select" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
  }
  .row {
    display: flex;
    gap: var(--leaf-space-6);
  }
  .cell {
    display: flex;
    flex-direction: column;
    width: 260px;
  }
  .field-label {
    display: block;
    font-family: var(--leaf-font-sans);
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    color: var(--leaf-color-ink);
    margin-bottom: 7px;
  }
  .field-label.is-disabled {
    color: var(--leaf-text-muted);
  }
  .control {
    position: relative;
    display: flex;
    align-items: center;
  }
  .field {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    width: 100%;
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 400;
    line-height: 1;
    color: var(--leaf-color-ink);
    background: var(--leaf-color-canvas);
    border: 1px solid var(--leaf-border-input);
    border-radius: var(--leaf-radius-md);
    padding: 11px 38px 11px 14px;
  }
  .field.is-disabled {
    color: var(--leaf-text-muted);
    background: var(--leaf-color-stone-faint);
    border: 1px solid rgba(23, 20, 18, 0.12);
    opacity: 0.7;
  }
  .chevron {
    position: absolute;
    right: 14px;
    display: flex;
    pointer-events: none;
    color: var(--leaf-color-warm-grey);
  }
  .cap {
    font: var(--leaf-type-caption);
    color: var(--leaf-text-muted);
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <label class="field-label" for="s1">Reporting frequency</label>
      <div class="control">
        <select id="s1" class="field">
          <option>Daily</option>
          <option selected>Weekly</option>
          <option>Monthly</option>
        </select>
        <span class="chevron">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </div>
      <span class="cap">Default</span>
    </div>
    <div class="cell">
      <label class="field-label is-disabled" for="s2">Export format</label>
      <div class="control">
        <select id="s2" class="field is-disabled" disabled>
          <option selected>CSV</option>
        </select>
        <span class="chevron">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </div>
      <span class="cap">Disabled</span>
    </div>
  </div>
</body>
</html>
