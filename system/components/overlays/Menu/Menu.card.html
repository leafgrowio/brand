<!-- @dsCard group="Components" viewport="700x260" subtitle="Rename / Duplicate / Export / Delete action list" name="Menu" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body { margin: 0; padding: var(--leaf-space-6); background: var(--leaf-surface-card); display: flex; justify-content: center; }
  .menu {
    width: 100%;
    max-width: 220px;
    background: var(--leaf-color-canvas);
    border: 1px solid var(--leaf-border-light);
    border-radius: 12px;
    box-shadow: var(--leaf-shadow-md);
    padding: 6px;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    font: 500 13.5px/1 var(--leaf-font-sans);
    color: var(--leaf-text-primary);
  }
  .item.is-highlighted { background: rgba(23, 20, 18, 0.05); }
  .item.is-destructive { color: var(--leaf-color-state-error); }
  .divider { height: 1px; background: rgba(23, 20, 18, 0.1); margin: 6px 4px; }
</style>
</head>
<body>
  <div class="menu" role="menu">
    <div class="item is-highlighted" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      Rename
    </div>
    <div class="item" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
      Duplicate
    </div>
    <div class="item" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 3v13m0 0-4-4m4 4 4-4"/></svg>
      Export
    </div>
    <div class="divider"></div>
    <div class="item is-destructive" role="menuitem">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-9 0 1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13"/></svg>
      Delete
    </div>
  </div>
</body>
</html>
