<!-- @dsCard group="Components" viewport="700x120" subtitle="active, inactive" name="Tabs" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
  }

  .tabs {
    display: flex;
    gap: 22px;
    border-bottom: 1px solid rgba(23, 20, 18, 0.12);
  }

  .tab {
    background: none;
    border: none;
    padding: 0 0 12px;
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 500;
    line-height: 1;
    color: var(--leaf-color-warm-grey);
  }

  .tab.active {
    font-weight: 600;
    color: var(--leaf-color-ink);
    box-shadow: inset 0 -2px 0 var(--leaf-color-coral);
  }
</style>
</head>
<body>
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true">Overview</button>
    <button class="tab" role="tab" aria-selected="false">Performance</button>
    <button class="tab" role="tab" aria-selected="false">Settings</button>
  </div>
</body>
</html>
