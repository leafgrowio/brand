<!-- @dsCard group="Components" viewport="700x260" subtitle="rest, hover, active, with count, collapsed" name="SidebarItem" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../../styles.css" />
<style>
  body {
    margin: 0;
    padding: var(--leaf-space-4);
    background: var(--leaf-surface-card);
    display: flex;
    align-items: flex-start;
    gap: var(--leaf-space-5);
  }

  .sidebar {
    width: 236px;
    background: var(--leaf-color-stone-faint);
    border-right: 1px solid rgba(23, 20, 18, 0.1);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-radius: var(--leaf-radius-md);
  }

  .group-label {
    font-family: var(--leaf-font-sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--leaf-text-muted);
    text-transform: uppercase;
    padding: 6px 12px 2px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 12px;
    border-radius: var(--leaf-radius-sm);
    font-family: var(--leaf-font-sans);
    font-size: 14px;
    font-weight: 500;
    line-height: 1;
    color: var(--leaf-color-ink);
    text-decoration: none;
  }

  .item .icon {
    display: inline-flex;
    width: 19px;
    height: 19px;
    flex-shrink: 0;
  }

  .item .label {
    flex: 1;
  }

  .item.hover {
    background: rgba(23, 20, 18, 0.05);
  }

  .item.active {
    padding: 9px 12px 9px 14px;
    font-weight: 600;
    color: var(--leaf-text-accent);
    background: var(--leaf-color-coral-tint);
    box-shadow: inset 3px 0 0 var(--leaf-color-coral);
  }

  .item .count {
    margin-left: auto;
    font-family: var(--leaf-font-sans);
    font-size: 11px;
    font-weight: 600;
    color: var(--leaf-text-accent);
    background: var(--leaf-color-coral-tint);
    border-radius: var(--leaf-radius-pill);
    padding: 3px 7px;
  }

  .state-caption {
    font-family: var(--leaf-font-sans);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--leaf-text-muted);
    padding: 0 12px;
    margin-top: -3px;
  }

  .rail {
    width: 60px;
    background: var(--leaf-color-stone-faint);
    border-right: 1px solid rgba(23, 20, 18, 0.1);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    border-radius: var(--leaf-radius-md);
  }

  .tile {
    width: 36px;
    height: 36px;
    border-radius: var(--leaf-radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--leaf-color-ink);
  }

  .tile svg {
    width: 19px;
    height: 19px;
  }

  .tile.active {
    color: var(--leaf-text-accent);
    background: var(--leaf-color-coral-tint);
    box-shadow: inset 3px 0 0 var(--leaf-color-coral);
  }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="group-label">Main</div>

    <a class="item" href="#">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="8" height="8" rx="1.5"></rect>
          <rect x="13" y="3" width="8" height="8" rx="1.5"></rect>
          <rect x="3" y="13" width="8" height="8" rx="1.5"></rect>
          <rect x="13" y="13" width="8" height="8" rx="1.5"></rect>
        </svg>
      </span>
      <span class="label">Overview</span>
    </a>

    <a class="item hover" href="#">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="20" x2="21" y2="20"></line>
          <rect x="5" y="13" width="4" height="7" rx="1"></rect>
          <rect x="10.5" y="8" width="4" height="12" rx="1"></rect>
          <rect x="16" y="4" width="4" height="16" rx="1"></rect>
        </svg>
      </span>
      <span class="label">Reports</span>
    </a>
    <div class="state-caption">Hover</div>

    <a class="item active" href="#" aria-current="page">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <circle cx="12" cy="12" r="5.5"></circle>
          <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"></circle>
        </svg>
      </span>
      <span class="label">Campaigns</span>
    </a>

    <a class="item" href="#">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="3"></circle>
          <path d="M3 20c0-3 2.5-5.5 6-5.5s6 2.5 6 5.5"></path>
          <path d="M15 14c2.8 0 5 2.2 5 6"></path>
        </svg>
      </span>
      <span class="label">Audiences</span>
      <span class="count">8</span>
    </a>
  </div>

  <div class="rail">
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="8" height="8" rx="1.5"></rect>
        <rect x="13" y="3" width="8" height="8" rx="1.5"></rect>
        <rect x="3" y="13" width="8" height="8" rx="1.5"></rect>
        <rect x="13" y="13" width="8" height="8" rx="1.5"></rect>
      </svg>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="20" x2="21" y2="20"></line>
        <rect x="5" y="13" width="4" height="7" rx="1"></rect>
        <rect x="10.5" y="8" width="4" height="12" rx="1"></rect>
        <rect x="16" y="4" width="4" height="16" rx="1"></rect>
      </svg>
    </div>
    <div class="tile active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <circle cx="12" cy="12" r="5.5"></circle>
        <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"></circle>
      </svg>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="8" r="3"></circle>
        <path d="M3 20c0-3 2.5-5.5 6-5.5s6 2.5 6 5.5"></path>
        <path d="M15 14c2.8 0 5 2.2 5 6"></path>
      </svg>
    </div>
  </div>
</body>
</html>
