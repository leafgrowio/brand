<!doctype html>
<!-- Leaf artifact starter — DOWNSTREAM of the Leaf design system (leafgrowio/brand system/, v1.0.2).
     Self-contained by design: artifacts cannot fetch external CSS, fonts, or images.
     Keep every colour a var(--leaf-*); one solid-Coral moment per view; Ink text on
     colour fills; sentence case, UK English, no exclamation marks. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Untitled — Leaf</title>
<style>
/* FONT: replace this comment with the full contents of assets/leaf-fonts-inline.css when type is prominent (decks, heroes, dashboards). For dense utilitarian output you may omit it; the stack below falls back gracefully. */

/* ===== Leaf tokens (paste of leaf-tokens.css — do not edit values) ===== */
/* Leaf design tokens — flattened for artifacts.
   DOWNSTREAM COPY of system/tokens/*.css in github.com/leafgrowio/brand (v1.0.2).
   Regenerate from the canonical files on version bumps; never edit values here.
   Paste this whole block into the artifact's <style>. */

/* Leaf colour tokens — source: DESIGN.md § Colour + § Data visualization + Implementation tokens,
   verified against the brand book. Base palette first, then state, data-viz, and semantic aliases.

   Usage rules live in DESIGN.md; the load-bearing ones:
   - Copy colour: text is Ink / Coral / Warm Grey / Aqua-on-dark ONLY. Never secondary colours or tints as text.
   - One decisive Coral moment per view. Solid Coral is for CTAs and small marks, never a large content fill.
   - Ink text on every colour fill; Canvas text only on the dark anchors (Ink, Warm Grey, solid states, large-text Coral). */

:root {
  /* --- core --- */
  --leaf-color-coral: #fb5e48;
  --leaf-color-coral-hover: #e8462f;
  --leaf-color-coral-tint: #fbe4df;
  --leaf-color-ink: #171412;
  --leaf-color-canvas: #fffdfb;

  /* --- neutral --- */
  --leaf-color-warm-grey: #656565;
  --leaf-color-stone: #f2e8e1; /* skeletons, muted chips */
  --leaf-color-stone-light: #f9f4f1; /* default page ground */
  --leaf-color-stone-faint: #fbf7f4; /* sidebar, table headers, zebra */
  --leaf-color-stone-deep: #ede3dc;
  --leaf-color-stone-hairline: #d9cfc8;

  /* --- highlight (dark surfaces only) --- */
  --leaf-color-aqua: #7ad8ce;

  /* --- secondary palette (fills only, never text) --- */
  --leaf-color-harbor: #4fa3a6;
  --leaf-color-marigold: #efb75a;
  --leaf-color-butter: #f6e49d;
  --leaf-color-apricot: #f4a38f;
  --leaf-color-rosehip: #d96b7c;
  --leaf-color-sage: #dce8c4;
  --leaf-color-laurel: #8ebb91;
  --leaf-color-eucalyptus: #9fc7bc;
  --leaf-color-lilac: #d8cff0;
  --leaf-color-heather: #aaa2d4;

  /* --- product state palette (solid for icons/dots/borders; tint + Ink text for fills) --- */
  --leaf-color-state-success: #2f8b57; /* Fern */
  --leaf-color-state-success-tint: #e7f1ea;
  --leaf-color-state-warning: #c77e1c; /* Amber */
  --leaf-color-state-warning-tint: #f6e9cc;
  --leaf-color-state-error: #c63a2b; /* Ember */
  --leaf-color-state-error-tint: #f7e0db;
  --leaf-color-state-info: #2e8388; /* Tidal */
  --leaf-color-state-info-tint: #ddecec;

  /* --- data-viz categorical series (fixed order) --- */
  --leaf-chart-series-1: #fb5e48; /* Coral — focus */
  --leaf-chart-series-2: #4fa3a6; /* Harbor */
  --leaf-chart-series-3: #efb75a; /* Marigold */
  --leaf-chart-series-4: #aaa2d4; /* Heather */
  --leaf-chart-series-5: #8ebb91; /* Laurel */
  --leaf-chart-series-6: #f4a38f; /* Apricot */
  --leaf-chart-grid: rgba(23, 20, 18, 0.07);
  --leaf-chart-axis: rgba(23, 20, 18, 0.16);

  /* --- data-viz neutral lead (dense dashboards: graphite carries the set, Coral flags one series) --- */
  --leaf-chart-neutral: #8c857e;
  --leaf-chart-mono-1: #3f3a36;
  --leaf-chart-mono-2: #8c857e;
  --leaf-chart-mono-3: #c9c2bb;

  /* --- sequential ramps (single measure) --- */
  --leaf-ramp-coral-1: #fbe4df;
  --leaf-ramp-coral-2: #f7a08f;
  --leaf-ramp-coral-3: #fb5e48;
  --leaf-ramp-coral-4: #c0392a;
  --leaf-ramp-harbor-1: #ddecec;
  --leaf-ramp-harbor-2: #9fc7bc;
  --leaf-ramp-harbor-3: #4fa3a6;
  --leaf-ramp-harbor-4: #2e8388;
  --leaf-heatmap-mid: #efeae6; /* diverging heatmap midpoint */

  /* --- semantic aliases --- */
  --leaf-text-primary: var(--leaf-color-ink);
  --leaf-text-secondary: var(--leaf-color-warm-grey);
  --leaf-text-muted: #9a8f86; /* placeholders, disabled labels, quiet captions (intentional addition — see readme) */
  --leaf-text-accent: var(--leaf-color-coral);
  --leaf-text-on-dark: var(--leaf-color-canvas);
  --leaf-text-on-dark-secondary: rgba(255, 253, 251, 0.6);
  --leaf-surface-page: var(--leaf-color-stone-light);
  --leaf-surface-card: var(--leaf-color-canvas);
  --leaf-surface-ink: var(--leaf-color-ink);
  --leaf-surface-ink-panel: rgba(255, 253, 251, 0.04);
  --leaf-border: var(--leaf-border-light);

  /* --- focus (focus-visible only; never removed) --- */
  --leaf-focus-ring: var(--leaf-color-coral);
  --leaf-focus-ring-dark: var(--leaf-color-aqua);
}

/* Leaf typography tokens — source: DESIGN.md § Typography + Implementation tokens.
   Mona Sans is the working font; Source Serif 4 is the editorial serif only. */

:root {
  /* --- families --- */
  --leaf-font-sans: "Mona Sans", "Helvetica Neue", Arial, sans-serif;
  --leaf-font-serif: "Source Serif 4", Georgia, serif;

  /* --- type scale (font shorthands; desktop anchors) --- */
  --leaf-type-display: 640 64px/0.96 "Mona Sans";
  --leaf-type-h1: 640 46px/1.0 "Mona Sans";
  --leaf-type-h2: 600 32px/1.05 "Mona Sans";
  --leaf-type-h3: 600 22px/1.2 "Mona Sans";
  --leaf-type-body-lg: 400 18px/1.55 "Mona Sans";
  --leaf-type-body: 400 16px/1.6 "Mona Sans";
  --leaf-type-label: 500 14px/1.4 "Mona Sans";
  --leaf-type-caption: 500 13px/1.4 "Mona Sans";

  /* --- stylistic sets: always on, enforced on * in fonts.css --- */
  --leaf-type-features: "ss03" on, "ss05" on, "ss06" on, "ss07" on;

  /* --- tracking: tighten large headings --- */
  --leaf-type-tracking-display: -0.03em;
  --leaf-type-tracking-heading: -0.02em;
}

/* Leaf spacing tokens — base unit 4px, 8px rhythm. Source: DESIGN.md § Spacing & layout. */

:root {
  --leaf-space-1: 4px;
  --leaf-space-2: 8px;
  --leaf-space-3: 12px;
  --leaf-space-4: 16px;
  --leaf-space-5: 24px;
  --leaf-space-6: 32px;
  --leaf-space-7: 48px;
  --leaf-space-8: 64px;
  --leaf-space-9: 96px;

  /* --- layout --- */
  --leaf-container-max: 1200px;
}

/* Leaf radius tokens — sm: chips/small controls · md: cards/tiles · lg: large panels · pill: buttons/tags. */

:root {
  --leaf-radius-sm: 8px;
  --leaf-radius-md: 14px;
  --leaf-radius-lg: 18px;
  --leaf-radius-pill: 999px;
}

/* Leaf elevation tokens — flat by default: hairline borders separate surfaces.
   One warm shadow family for lifted/transient surfaces only. Never shadow + heavy border together. */

:root {
  /* --- borders --- */
  --leaf-border-light: rgba(23, 20, 18, 0.1);
  --leaf-border-dark: rgba(255, 253, 251, 0.12);
  --leaf-border-input: rgba(23, 20, 18, 0.18);

  /* --- shadows --- */
  --leaf-shadow-sm: 0 1px 2px rgba(23, 20, 18, 0.05), 0 2px 6px rgba(23, 20, 18, 0.05);
  --leaf-shadow-md: 0 4px 12px rgba(23, 20, 18, 0.08), 0 12px 28px rgba(23, 20, 18, 0.07);

  /* --- overlay scrim (modals, drawers) --- */
  --leaf-scrim: rgba(23, 20, 18, 0.44);
}

/* Leaf motion tokens — minimal and purposeful. Animate opacity and transform only;
   ease-out; always honour prefers-reduced-motion. */

:root {
  --leaf-motion-fast: 120ms;
  --leaf-motion-base: 180ms;
  --leaf-ease: cubic-bezier(0.2, 0, 0, 1);
}

/* ===== Base ===== */
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--leaf-surface-page);
  color: var(--leaf-text-primary);
  font: var(--leaf-type-body);
  font-family: "Mona Sans", -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 { margin: 0 0 var(--leaf-space-3); }
h1 { font: var(--leaf-type-h1); letter-spacing: var(--leaf-type-tracking-heading); }
h2 { font: var(--leaf-type-h2); letter-spacing: var(--leaf-type-tracking-heading); }
h3 { font: var(--leaf-type-h3); }
h1, h2, h3, .leaf-btn, .leaf-badge, .leaf-eyebrow, .leaf-kpi-label, .leaf-kpi-value { font-family: "Mona Sans", -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
p { margin: 0 0 var(--leaf-space-3); }
a { color: var(--leaf-text-accent); text-decoration: none; }
a:hover { color: var(--leaf-color-ink); }
::selection { background: var(--leaf-color-coral); color: var(--leaf-color-canvas); }
:focus-visible { outline: 2px solid var(--leaf-focus-ring); outline-offset: 2px; }
.leaf-page { max-width: var(--leaf-container-max); margin: 0 auto; padding: var(--leaf-space-6) var(--leaf-space-5); }

/* ===== Components (distilled from the component library) ===== */
.leaf-btn { display: inline-flex; align-items: center; gap: var(--leaf-space-2); white-space: nowrap; font-size: 14px; font-weight: 600; line-height: 1; color: var(--leaf-color-canvas); background: var(--leaf-color-coral); padding: 11px 20px; border: 0; border-radius: var(--leaf-radius-pill); cursor: pointer; transition: background var(--leaf-motion-fast) var(--leaf-ease); }
.leaf-btn:hover { background: var(--leaf-color-coral-hover); }
.leaf-btn--secondary { color: var(--leaf-color-coral); background: transparent; border: 1px solid var(--leaf-color-coral); padding: 10px 19px; }
.leaf-btn--secondary:hover { background: var(--leaf-color-coral-tint); }
.leaf-card { background: var(--leaf-surface-card); border: 1px solid var(--leaf-border); border-radius: var(--leaf-radius-md); padding: var(--leaf-space-5); }
.leaf-block { background: var(--leaf-color-coral-tint); border: 1px solid rgba(251, 94, 72, 0.42); border-radius: var(--leaf-radius-md); padding: var(--leaf-space-5); color: var(--leaf-text-primary); }
.leaf-eyebrow { display: inline-block; font: var(--leaf-type-caption); font-weight: 600; color: var(--leaf-text-accent); letter-spacing: 0.02em; margin-bottom: var(--leaf-space-2); }
.leaf-kpi-label { font: var(--leaf-type-caption); color: var(--leaf-text-secondary); margin-bottom: var(--leaf-space-2); }
.leaf-kpi-value { font-size: 26px; font-weight: 640; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.leaf-delta-up { color: var(--leaf-color-state-success); font-weight: 600; }
.leaf-delta-down { color: var(--leaf-color-state-error); font-weight: 600; }
.leaf-table { width: 100%; border-collapse: collapse; background: var(--leaf-surface-card); }
.leaf-table th { background: var(--leaf-color-stone-faint); border-bottom: 1.5px solid rgba(23, 20, 18, 0.14); font-size: 11.5px; font-weight: 600; letter-spacing: 0.02em; color: var(--leaf-color-ink); text-align: left; padding: 13px 16px; }
.leaf-table td { border-bottom: 1px solid rgba(23, 20, 18, 0.07); font-size: 13.5px; padding: 12px 16px; }
.leaf-table th.num, .leaf-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.leaf-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; line-height: 1; color: var(--leaf-color-ink); border-radius: var(--leaf-radius-pill); padding: 6px 12px; }
.leaf-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; }
.leaf-badge--success { background: var(--leaf-color-state-success-tint); border: 1px solid rgba(47, 139, 87, 0.25); } .leaf-badge--success::before { background: var(--leaf-color-state-success); }
.leaf-badge--warning { background: var(--leaf-color-state-warning-tint); border: 1px solid rgba(199, 126, 28, 0.28); } .leaf-badge--warning::before { background: var(--leaf-color-state-warning); }
.leaf-badge--error { background: var(--leaf-color-state-error-tint); border: 1px solid rgba(198, 58, 43, 0.28); } .leaf-badge--error::before { background: var(--leaf-color-state-error); }
.leaf-badge--info { background: var(--leaf-color-state-info-tint); border: 1px solid rgba(46, 131, 136, 0.28); } .leaf-badge--info::before { background: var(--leaf-color-state-info); }
.leaf-alert { display: flex; align-items: center; gap: 14px; border-radius: 12px; padding: 14px 18px; font-size: 14.5px; color: var(--leaf-color-ink); }
.leaf-alert--info { background: var(--leaf-color-state-info-tint); border: 1px solid rgba(46, 131, 136, 0.28); border-left: 3px solid var(--leaf-color-state-info); }
.leaf-alert--success { background: var(--leaf-color-state-success-tint); border: 1px solid rgba(47, 139, 87, 0.28); border-left: 3px solid var(--leaf-color-state-success); }
.leaf-alert--warning { background: var(--leaf-color-state-warning-tint); border: 1px solid rgba(199, 126, 28, 0.30); border-left: 3px solid var(--leaf-color-state-warning); }
.leaf-alert--error { background: var(--leaf-color-state-error-tint); border: 1px solid rgba(198, 58, 43, 0.30); border-left: 3px solid var(--leaf-color-state-error); }
@media (prefers-reduced-motion: reduce) { * { transition: none; animation: none; } }
</style>
</head>
<body>
<main class="leaf-page">
  <!-- Build here. Rules: one solid-Coral primary per view (.leaf-btn); Coral tint
       blocks (.leaf-block) for emphasis fills; Canvas cards on the Stone page ground;
       charts use --leaf-chart-series-1..6 in order with hairline --leaf-chart-grid;
       numbers: £1.49M · 3.72x · 24.6% · ▲/▼ deltas · em-dash for missing. -->
  <span class="leaf-eyebrow">Performance intelligence</span>
  <h1>Know what your marketing actually earned</h1>
  <p style="color: var(--leaf-text-secondary); max-width: 60ch;">Replace this starter content. Keep sentence case, UK English, and the mechanism before the claim.</p>
  <p><span class="leaf-btn">Start with Signal</span> <span class="leaf-btn leaf-btn--secondary" style="margin-left: 8px;">See a report</span></p>
</main>
</body>
</html>
